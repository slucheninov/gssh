name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify GSSH_VERSION matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CODE_VERSION=$(grep -oP 'GSSH_VERSION="\K[^"]+' gssh.zsh)
          if [[ "$TAG" != "$CODE_VERSION" ]]; then
            echo "::error::Tag v${TAG} does not match GSSH_VERSION=\"${CODE_VERSION}\" in gssh.zsh"
            echo "Use 'make release VERSION=${TAG}' to update both"
            exit 1
          fi

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck shfmt zsh

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [[ -z "$PREV_TAG" ]]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.txt
          files: |
            gssh.zsh
            _gssh
            install.sh
            uninstall.sh
          generate_release_notes: false
